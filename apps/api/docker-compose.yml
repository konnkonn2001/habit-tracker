version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: habit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: habit
      POSTGRES_PASSWORD: habit
      POSTGRES_DB: habit_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: